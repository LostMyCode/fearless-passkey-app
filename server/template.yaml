AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Passkey Authentication API

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    Environment:
      Variables:
        RP_ID: !Ref RpId
        RP_NAME: !Ref RpName
        ORIGIN: !Ref Origin
        DDB_TABLE_NAME: !Ref PasskeysTable
        JWT_PUBLIC_KEY: !Ref JwtPublicKey
        JWT_EXPIRY: !Ref JwtExpiry
        AUTH_CODES_TABLE: !Ref CodesTable
        LOGIN_PAGE_TITLE: !Ref LoginPageTitle

Parameters:
  RpId:
    Type: String
    Default: localhost
    Description: Relying Party ID (domain)
  RpName:
    Type: String
    Default: Passkey Demo
    Description: Relying Party Name
  Origin:
    Type: String
    Default: http://localhost:5173
    Description: Frontend origin for CORS
  JwtPrivateKeyParam:
    Type: String
    Description: SSM Parameter Store path for the RS256 private key (e.g. /fearless/jwt-private-key)
  JwtPublicKey:
    Type: String
    Description: RS256 public key PEM for verifying JWTs
  JwtExpiry:
    Type: Number
    Default: 28800
    Description: JWT expiry in seconds (default 8 hours)
  LoginPageTitle:
    Type: String
    Default: Sign In
    Description: Title displayed on the login page

Resources:
  # DynamoDB Tables
  PasskeysTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-passkeys"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: credentialId
          AttributeType: S
      KeySchema:
        - AttributeName: credentialId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  CodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-codes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # API Gateway
  PasskeyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${AWS::StackName}-PasskeyApi"
      CorsConfiguration:
        AllowOrigins:
          - !Ref Origin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600

  # Separate API for public endpoints that need CORS open to all origins
  PublicApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${AWS::StackName}-PublicApi"
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - OPTIONS
        MaxAge: 86400

  # Lambda Functions
  RegistrationOptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-RegistrationOptions"
      CodeUri: .
      Handler: src/handlers/registrationOptions.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /webauthn/registration/options
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/registrationOptions.ts

  RegistrationVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-RegistrationVerify"
      CodeUri: .
      Handler: src/handlers/registrationVerify.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /webauthn/registration/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PasskeysTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/registrationVerify.ts

  AuthenticationOptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthenticationOptions"
      CodeUri: .
      Handler: src/handlers/authenticationOptions.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /webauthn/authentication/options
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PasskeysTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/authenticationOptions.ts

  AuthenticationVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthenticationVerify"
      CodeUri: .
      Handler: src/handlers/authenticationVerify.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /webauthn/authentication/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PasskeysTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CodesTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/authenticationVerify.ts

  AuthExchangeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthExchange"
      CodeUri: .
      Handler: src/handlers/authExchange.handler
      Environment:
        Variables:
          JWT_PRIVATE_KEY_PARAM: !Ref JwtPrivateKeyParam
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /auth/exchange
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CodesTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${JwtPrivateKeyParam}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/authExchange.ts

  AuthPublicKeyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthPublicKey"
      CodeUri: .
      Handler: src/handlers/authPublicKey.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicApi
            Path: /auth/public-key
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/authPublicKey.ts

  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthLogin"
      CodeUri: .
      Handler: src/handlers/authLogin.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PasskeyApi
            Path: /auth/login
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        EntryPoints:
          - src/handlers/authLogin.ts

Outputs:
  PasskeyApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PasskeyApi}.execute-api.${AWS::Region}.amazonaws.com"

  PublicApiUrl:
    Description: Public API endpoint URL (CORS open, for /auth/public-key)
    Value: !Sub "https://${PublicApi}.execute-api.${AWS::Region}.amazonaws.com"

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref PasskeysTable

  CodesTableName:
    Description: DynamoDB codes table name
    Value: !Ref CodesTable
